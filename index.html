<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нейро-Устав</title>
    <!-- Подключение React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Подключение Babel для JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Базовые стили для темной темы */
        body { background-color: #070707; color: #e5e5e5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Иконки (замена lucide-react на inline SVG для автономности)
        const IconCheck = ({ size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>
        );
        const IconSquare = ({ size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
        );
        const IconPlus = ({ size = 18, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const IconX = ({ size = 18, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );

        // ЭТАЛОННЫЙ УСТАВ
        const BASE_PROTOCOL = [
          { id: '1', time: '05:30', title: 'ПРОБУЖДЕНИЕ И ЗАПУСК', completed: false, subtasks: [ { id: '1-1', title: 'Холодная вода + Вода с солью (электролиты)', completed: false }, { id: '1-2', title: 'Свет в глаза (5-10 мин улицы/балкона) — фиксация кортизола', completed: false } ] },
          { id: '2', time: '06:00', title: 'АРХИТЕКТУРА (ФАЗА I)', completed: false, subtasks: [ { id: '2-1', title: 'Глубокая работа без сети (Deep Work)', completed: false }, { id: '2-2', title: 'Самый сложный код дня', completed: false } ] },
          { id: '3', time: '07:30', title: 'ИНЪЕКЦИЯ СТИМУЛЯТОРА', completed: false, subtasks: [ { id: '3-1', title: 'Черный кофе (аденозин очищен)', completed: false } ] },
          { id: '4', time: '08:00', title: 'АРХИТЕКТУРА (ФАЗА II)', completed: false, subtasks: [ { id: '4-1', title: 'Продолжение работы (на пике концентрации)', completed: false } ] },
          { id: '5', time: '10:30', title: 'КИНЕТИКА И ЭНТРОПИЯ', completed: false, subtasks: [ { id: '5-1', title: 'Ходьба (Зона 2 кардио) / Разгрузка мозга', completed: false }, { id: '5-2', title: 'Силовая база с железом (анаболический стресс)', completed: false } ] },
          { id: '6', time: '12:30', title: 'ОТКРЫТИЕ ОКНА (БАЗОВЫЙ МАТЕРИАЛ)', completed: false, subtasks: [ { id: '6-1', title: 'Массивный прием: Животный белок, жиры', completed: false } ] },
          { id: '7', time: '13:30', title: 'АДМИНИСТРИРОВАНИЕ', completed: false, subtasks: [ { id: '7-1', title: 'Связь с клиентами, рутина', completed: false }, { id: '7-2', title: 'Планирование архитектуры на завтра', completed: false } ] },
          { id: '8', time: '17:00', title: 'СТРУКТУРНАЯ ПАУЗА', completed: false, subtasks: [ { id: '8-1', title: 'Растяжка (мобильность фасций)', completed: false }, { id: '8-2', title: 'Пустота (амортизация стресса)', completed: false } ] },
          { id: '9', time: '18:30', title: 'ЗАКРЫТИЕ ОКНА', completed: false, subtasks: [ { id: '9-1', title: 'Легкий прием (овощи, клетчатка)', completed: false } ] },
          { id: '10', time: '20:00', title: 'СЕНСОРНАЯ ДЕПРИВАЦИЯ (ПАРАСИМПАТИКА)', completed: false, subtasks: [ { id: '10-1', title: 'Отключение всех мониторов', completed: false }, { id: '10-2', title: 'Учеба / Чтение физических носителей', completed: false } ] },
          { id: '11', time: '22:00', title: 'ПУСТОТА (СОН)', completed: false, subtasks: [] }
        ];

        function BrutalistSchedule() {
          const [tasks, setTasks] = useState([]);
          const [newTaskTime, setNewTaskTime] = useState('');
          const [newTaskTitle, setNewTaskTitle] = useState('');
          const [addingSubtaskId, setAddingSubtaskId] = useState(null);
          const [newSubtaskTitle, setNewSubtaskTitle] = useState('');

          useEffect(() => {
            const savedData = localStorage.getItem('brutalist-state-v3');
            const lastDate = localStorage.getItem('brutalist-date-v3');
            const today = new Date().toDateString();

            if (lastDate !== today) {
              setTasks(BASE_PROTOCOL);
              localStorage.setItem('brutalist-date-v3', today);
              localStorage.setItem('brutalist-state-v3', JSON.stringify(BASE_PROTOCOL));
            } else {
              setTasks(savedData ? JSON.parse(savedData) : BASE_PROTOCOL);
            }
          }, []);

          useEffect(() => {
            if (tasks.length > 0) {
              localStorage.setItem('brutalist-state-v3', JSON.stringify(tasks));
            }
          }, [tasks]);

          const toggleTask = (taskId) => {
            setTasks(tasks.map(t => {
              if (t.id === taskId) {
                const isNowCompleted = !t.completed;
                return { ...t, completed: isNowCompleted, subtasks: t.subtasks.map(st => ({ ...st, completed: isNowCompleted })) };
              }
              return t;
            }));
          };

          const toggleSubtask = (taskId, subtaskId) => {
            setTasks(tasks.map(t => {
              if (t.id === taskId) {
                return { ...t, subtasks: t.subtasks.map(st => st.id === subtaskId ? { ...st, completed: !st.completed } : st ) };
              }
              return t;
            }));
          };

          const addTask = (e) => {
            e.preventDefault();
            if (!newTaskTitle.trim()) return;
            const newTask = {
              id: 'custom-' + Date.now().toString(),
              time: newTaskTime.trim() || '--:--',
              title: newTaskTitle.trim().toUpperCase(),
              completed: false,
              isEphemeral: true,
              subtasks: []
            };
            const updatedTasks = [...tasks, newTask].sort((a, b) => a.time.localeCompare(b.time));
            setTasks(updatedTasks);
            setNewTaskTime('');
            setNewTaskTitle('');
          };

          const deleteTask = (taskId) => setTasks(tasks.filter(t => t.id !== taskId));

          const addSubtask = (taskId, e) => {
            e.preventDefault();
            if (!newSubtaskTitle.trim()) {
              setAddingSubtaskId(null);
              return;
            }
            setTasks(tasks.map(t => {
              if (t.id === taskId) {
                return { ...t, subtasks: [...t.subtasks, { id: 'custom-sub-' + Date.now().toString(), title: newSubtaskTitle.trim(), completed: false }] };
              }
              return t;
            }));
            setNewSubtaskTitle('');
            setAddingSubtaskId(null);
          };

          const deleteSubtask = (taskId, subtaskId) => setTasks(tasks.map(t => t.id === taskId ? { ...t, subtasks: t.subtasks.filter(st => st.id !== subtaskId) } : t));

          return (
            <div className="min-h-screen bg-[#070707] text-[#e5e5e5] font-mono p-4 sm:p-8 selection:bg-neutral-800">
              <div className="max-w-4xl mx-auto">
                <header className="mb-12 border-b-2 border-neutral-800 pb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                  <div>
                    <h1 className="text-3xl sm:text-5xl font-bold tracking-tighter uppercase text-neutral-300">
                      Нейро-Устав
                    </h1>
                    <p className="text-neutral-500 mt-2 text-sm uppercase tracking-widest">
                      Синхронизация: {new Date().toLocaleDateString('ru-RU', { weekday: 'long', month: 'long', day: 'numeric' })}
                    </p>
                  </div>
                  <div className="text-xs text-neutral-600 uppercase tracking-widest text-right border-l-2 border-neutral-800 pl-4">
                    Энтропия контролируется<br/>
                    Сброс данных: 00:00
                  </div>
                </header>

                <div className="space-y-4">
                  {tasks.map((task) => (
                    <div key={task.id} className={`border border-neutral-800 bg-[#0c0c0c] p-4 transition-all duration-300 ${task.completed ? 'opacity-30 border-neutral-900 bg-black grayscale' : 'hover:border-neutral-500'} ${task.isEphemeral ? 'border-l-4 border-l-neutral-600' : ''}`}>
                      <div className="flex items-start justify-between group">
                        <div className="flex items-start gap-4 flex-1 cursor-pointer" onClick={() => toggleTask(task.id)}>
                          <button className="mt-1 flex-shrink-0 text-neutral-500 hover:text-white transition-colors">
                            {task.completed ? <IconCheck size={20} className="text-neutral-300" /> : <IconSquare size={20} />}
                          </button>
                          <div className="flex flex-col sm:flex-row sm:items-baseline gap-2 sm:gap-6 flex-1">
                            <span className="text-neutral-500 font-bold w-14 text-lg">{task.time}</span>
                            <span className={`font-bold text-lg sm:text-xl tracking-wide ${task.completed ? 'line-through text-neutral-600' : 'text-neutral-200'}`}>{task.title}</span>
                          </div>
                        </div>
                        <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                          <button onClick={() => setAddingSubtaskId(task.id)} className="text-neutral-500 hover:text-white p-2" title="Декомпозировать"><IconPlus size={18} /></button>
                          <button onClick={() => deleteTask(task.id)} className="text-neutral-500 hover:text-red-800 p-2" title="Удалить"><IconX size={18} /></button>
                        </div>
                      </div>

                      {addingSubtaskId === task.id && (
                        <form onSubmit={(e) => addSubtask(task.id, e)} className="mt-4 sm:ml-16 ml-10 flex gap-2">
                          <input autoFocus type="text" value={newSubtaskTitle} onChange={(e) => setNewSubtaskTitle(e.target.value)} onBlur={() => { if(!newSubtaskTitle.trim()) setAddingSubtaskId(null); }} placeholder="Параметр..." className="bg-transparent border-b border-neutral-700 text-sm focus:border-neutral-400 outline-none px-1 py-1 flex-1 text-neutral-400" />
                          <button type="submit" className="text-xs uppercase tracking-wider text-neutral-500 hover:text-white border border-neutral-800 px-3 py-1">Ввод</button>
                        </form>
                      )}

                      {task.subtasks.length > 0 && (
                        <div className="mt-4 sm:ml-16 ml-10 space-y-3 border-l-2 border-neutral-800 pl-4">
                          {task.subtasks.map((subtask) => (
                            <div key={subtask.id} className="flex items-center justify-between group/sub">
                              <div className="flex items-center gap-3 cursor-pointer flex-1" onClick={() => toggleSubtask(task.id, subtask.id)}>
                                <button className="text-neutral-600 hover:text-neutral-300 transition-colors">
                                  {subtask.completed ? <IconCheck size={16} className="text-neutral-600" /> : <IconSquare size={16} />}
                                </button>
                                <span className={`text-sm tracking-wide ${subtask.completed ? 'line-through text-neutral-600' : 'text-neutral-400'}`}>{subtask.title}</span>
                              </div>
                              <button onClick={() => deleteSubtask(task.id, subtask.id)} className="text-neutral-700 hover:text-red-900 opacity-0 group-hover/sub:opacity-100 p-1 transition-opacity"><IconX size={14} /></button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                <div className="mt-16 pt-8 border-t-2 border-neutral-900">
                  <h2 className="text-neutral-600 uppercase text-xs font-bold tracking-widest mb-4">Временная задача <span className="text-neutral-800 lowercase font-normal">(исчезнет в полночь)</span></h2>
                  <form onSubmit={addTask} className="flex flex-col sm:flex-row gap-4">
                    <input type="text" value={newTaskTime} onChange={(e) => setNewTaskTime(e.target.value)} placeholder="00:00" className="bg-[#050505] border border-neutral-800 text-neutral-300 focus:border-neutral-500 outline-none px-4 py-4 w-full sm:w-28 placeholder-neutral-800 text-center text-lg" />
                    <input type="text" value={newTaskTitle} onChange={(e) => setNewTaskTitle(e.target.value)} placeholder="СУЩНОСТЬ" className="bg-[#050505] border border-neutral-800 text-neutral-300 focus:border-neutral-500 outline-none px-4 py-4 flex-1 placeholder-neutral-800 uppercase tracking-widest" />
                    <button type="submit" className="bg-neutral-900 text-neutral-400 hover:bg-neutral-300 hover:text-black transition-colors px-8 py-4 font-bold uppercase tracking-widest">Внести</button>
                  </form>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BrutalistSchedule />);
    </script>
</body>
</html>
